<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonus Module 7 — Ton Profil Hormonal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1f15;
    --bg2: #162a1e;
    --bg3: #1e3828;
    --green: #3a7a50;
    --green-light: #4e9666;
    --gold: #c9a84c;
    --gold-light: #e2c47a;
    --gold-pale: rgba(201,168,76,0.12);
    --cream: #f5f0e8;
    --cream2: rgba(245,240,232,0.75);
    --white: #ffffff;
    --text: rgba(245,240,232,0.9);
    --text-dim: rgba(245,240,232,0.55);
    --border: rgba(201,168,76,0.2);
    --border2: rgba(201,168,76,0.35);
  }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #0a1a0f, #162a1e, #1e3828);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.08);
  }
  .header .tag {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .header h1 span { color: var(--gold); }
  .header p {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ===== QUIZ ===== */
  #quiz-section {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .progress-bar {
    background: rgba(201,168,76,0.1);
    border-radius: 30px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 30px;
    transition: width 0.4s ease;
  }
  .progress-label {
    text-align: right;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .question-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 20px;
  }
  .question-card .q-num {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .question-card .q-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--cream);
    line-height: 1.4;
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    transition: all 0.2s;
    text-align: left;
  }
  .option:hover { background: var(--gold-pale); border-color: var(--gold); color: var(--cream); }
  .option.selected { background: var(--gold-pale); border-color: var(--gold); color: var(--cream); }
  .option.selected::before { content: '✓ '; color: var(--gold); font-weight: 700; }

  .btn-next {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--green), var(--green-light));
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: var(--cream);
    font-family: 'Lato', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
    display: none;
  }
  .btn-next:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .btn-next.visible { display: block; }

  /* ===== RESULTS ===== */
  #result-section { display: none; max-width: 780px; margin: 0 auto; padding: 32px 20px 80px; }

  .result-header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .result-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.1);
  }
  .result-header .emoji { font-size: 48px; margin-bottom: 12px; }
  .result-header .profile-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--cream);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .result-header .description {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 540px;
    margin: 0 auto;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .tab-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .tab-btn:hover { border-color: var(--gold); color: var(--cream); }
  .tab-btn.active { background: var(--gold-pale); border-color: var(--gold); color: var(--gold); font-weight: 700; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Content cards */
  .reco-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 14px;
  }
  .reco-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .reco-card ul {
    padding-left: 18px;
  }
  .reco-card li {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 6px;
  }
  .reco-card li strong { color: var(--gold-light); }
  .reco-card p { font-size: 14px; color: var(--text); line-height: 1.7; }

  .highlight-reco {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 14px;
  }
  .highlight-reco p { font-size: 14px; color: var(--cream); line-height: 1.7; }
  .highlight-reco strong { color: var(--gold); }

  /* Plan 7 jours */
  .day-grid { display: flex; flex-direction: column; gap: 8px; }
  .day-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .day-label {
    background: var(--gold-pale);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
    white-space: nowrap;
    min-width: 60px;
    text-align: center;
    margin-top: 2px;
  }
  .day-text { font-size: 13px; color: var(--text); line-height: 1.6; }

  /* Other profiles */
  .other-profiles {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .other-profiles h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--cream);
    margin-bottom: 16px;
  }
  .profiles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  .profile-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .profile-btn:hover { border-color: var(--gold); background: var(--gold-pale); }
  .profile-btn .p-emoji { font-size: 22px; margin-bottom: 6px; }
  .profile-btn .p-name { font-size: 13px; color: var(--cream); font-weight: 700; line-height: 1.3; }
  .profile-btn .p-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .btn-retake {
    display: block;
    margin: 24px auto 0;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 28px;
    color: var(--text-dim);
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-retake:hover { color: var(--cream); border-color: var(--gold); }
</style>
</head>

<div class="header">

// Quiz state
let currentQ = 0;
let scores = { thyroide: 0, insuline: 0, oestrogenes: 0, cortisol: 0, equilibre: 0 };
let selectedAnswer = null;

function renderQuestion() {
  const q = questions[currentQ];
  const progress = Math.round(((currentQ) / questions.length) * 100) + 8;
  document.getElementById('progress-fill').style.width = progress + '%';
  document.getElementById('progress-label').textContent = 'Question ' + (currentQ + 1) + ' / ' + questions.length;

  let html = `<div class="question-card">
    <div class="q-num">Question ${currentQ + 1} sur ${questions.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="options">`;
  q.options.forEach((opt, i) => {
    html += `<button class="option" onclick="selectOption(this, ${i})">${opt.text}</button>`;
  });
  html += `</div></div>`;
  document.getElementById('question-container').innerHTML = html;
  selectedAnswer = null;
  document.getElementById('btn-next').classList.remove('visible');
}

function selectOption(el, idx) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedAnswer = idx;
  const btn = document.getElementById('btn-next');
  btn.textContent = currentQ < questions.length - 1 ? 'Question suivante →' : 'Voir mon profil →';
  btn.classList.add('visible');
}

function nextQuestion() {
  if (selectedAnswer === null) return;
  const scoreMap = questions[currentQ].options[selectedAnswer].scores;
  for (const [key, val] of Object.entries(scoreMap)) {
    if (scores[key] !== undefined) scores[key] += val;
  }
  currentQ++;
  if (currentQ < questions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

function getTopProfiles() {
  const ranked = Object.entries(scores)
    .filter(([k]) => k !== 'equilibre')
    .sort((a, b) => b[1] - a[1]);
  const topScore = ranked[0][1];
  const secondScore = ranked[1][1];
  let primary = topScore < 4 ? 'equilibre' : ranked[0][0];
  let secondary = null;
  if (primary !== 'equilibre' && secondScore >= 3 && secondScore >= topScore * 0.6) {
    secondary = ranked[1][0];
  }
  return { primary, secondary };
}

function showResults(profileKey, secondaryKey) {
  const { primary, secondary } = profileKey ? { primary: profileKey, secondary: secondaryKey || null } : getTopProfiles();
  const key = primary;
  const profile = profiles[key];
  const secProfile = secondary ? profiles[secondary] : null;
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';

  // Header
  document.getElementById('result-header').innerHTML = `

    <div style="color:var(--gold);font-size:13px;margin-bottom:12px;">${profile.subtitle}</div>
    <p class="description">${profile.description}</p>
    ${secProfile ? `

      <div style="font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;">Profil secondaire associé</div>

      <div style="font-size:15px;color:var(--cream);font-weight:700;">${secProfile.name}</div>

      <button onclick="showResults('${secondary}')" style="margin-top:10px;background:none;border:1px solid rgba(201,168,76,0.4);border-radius:8px;padding:6px 16px;color:var(--gold);font-family:Lato,sans-serif;font-size:12px;cursor:pointer;letter-spacing:0.5px;">Voir les recommandations →</button>
    </div>` : ''}
  `;

  // Tabs
  const tabNames = Object.keys(profile.tabs);
  let tabsHtml = '';
  tabNames.forEach((t, i) => {
    tabsHtml += `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(this, 'tab-${key}-${i}')">${t}</button>`;
  });
  document.getElementById('tabs-container').innerHTML = tabsHtml;

  // Tab content
  let contentHtml = '';
  tabNames.forEach((tabName, i) => {
    const tab = profile.tabs[tabName];
    contentHtml += `<div class="tab-content ${i===0?'active':''}" id="tab-${key}-${i}">`;
    contentHtml += `<div class="reco-card"><h3>${tab.title}</h3>`;

    if (tab.days) {
      contentHtml += `<div class="day-grid">`;
      tab.days.forEach(d => {
        contentHtml += `<div class="day-item"><span class="day-label">${d.label}</span><span class="day-text">${d.text}</span></div>`;
      });
      contentHtml += `</div>`;
    } else if (tab.content) {
      tab.content.forEach(block => {
        if (block.type === 'list') {
          contentHtml += `<div style="margin-bottom:16px;"><p style="font-size:13px;font-weight:700;color:var(--gold-light);margin-bottom:8px;">${block.title}</p><ul>`;
          block.items.forEach(item => { contentHtml += `<li>${item}</li>`; });
          contentHtml += `</ul></div>`;
        }
      });
    }

    contentHtml += `</div></div>`;
  });
  document.getElementById('tabs-content').innerHTML = contentHtml;

  let othersHtml = '';
  Object.entries(profiles).forEach(([k, p]) => {
    if (k !== key) {
      othersHtml += `<button class="profile-btn" onclick="showResults('${k}')">
        <div class="p-emoji">${p.emoji}</div>
        <div class="p-name">${p.name}</div>
        <div class="p-sub">${p.subtitle}</div>
      </button>`;
    }
  });
  document.getElementById('other-profiles-grid').innerHTML = othersHtml;
  window.scrollTo(0, 0);
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function retakeQuiz() {
  currentQ = 0;
  scores = { thyroide: 0, insuline: 0, oestrogenes: 0, cortisol: 0, equilibre: 0 };
  selectedAnswer = null;
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  renderQuestion();
  window.scrollTo(0, 0);
}

// Init
renderQuestion();
</script>
</body>
